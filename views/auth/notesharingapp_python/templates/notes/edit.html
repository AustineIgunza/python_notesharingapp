{% extends "base.html" %}

{% block title %}Edit Note - Notes Sharing App{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h5 class="mb-0">Edit Note</h5>
            </div>
            <div class="card-body">
                <form method="post" class="needs-validation">
                    <div class="mb-3">
                        <label for="title" class="form-label">Title *</label>
                        <input type="text" class="form-control" id="title" name="title" value="{{ note.title }}" required maxlength="255">
                    </div>
                    
                    <div class="mb-3">
                        <label for="content" class="form-label">Content</label>
                        <textarea class="form-control" id="content" name="content" rows="10" style="resize: vertical;">{{ note.content }}</textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="category_id" class="form-label">Category</label>
                        <select class="form-select" id="category_id" name="category_id">
                            <option value="">-- Select Category --</option>
                            {% for cat in categories %}
                                <option value="{{ cat.id }}" {% if cat.id == note.category_id %}selected{% endif %}>{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="is_public" name="is_public" {% if note.is_public %}checked{% endif %}>
                        <label class="form-check-label" for="is_public">Make this note public</label>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-info text-white">Update Note</button>
                        <a href="/dashboard" class="btn btn-secondary">Cancel</a>
                        <form action="/notes/{{ note.id }}/delete" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-danger" onclick="return confirm('Delete this note?')">Delete</button>
                        </form>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
