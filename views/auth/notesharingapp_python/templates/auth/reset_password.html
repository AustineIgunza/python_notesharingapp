{% extends "base.html" %}

{% block title %}Reset Password - Notes Sharing App{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <h2 class="card-title text-center mb-4">Create New Password</h2>
                
                <form method="post" class="needs-validation">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="code" class="form-label">Reset Code (from email)</label>
                        <input type="text" class="form-control text-center font-monospace" id="code" name="code" maxlength="6" pattern="\d{6}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="new_password" class="form-label">New Password</label>
                        <input type="password" class="form-control" id="new_password" name="new_password" required>
                        <small class="text-muted">Minimum 4 characters</small>
                    </div>
                    
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100 mb-2">Reset Password</button>
                </form>
                
                <p class="text-center mt-4 mb-0">
                    <a href="/auth/signin">Back to Sign In</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
