{% extends "base.html" %}

{% block title %}Forgot Password - Notes Sharing App{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <h2 class="card-title text-center mb-4">🔑 Reset Password</h2>
                <p class="text-center text-muted mb-4">Enter your email and we'll send you a reset code</p>
                
                <form method="post" class="needs-validation">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    
                    <button type="submit" class="btn btn-warning w-100 mb-2">Send Reset Code</button>
                </form>
                
                <p class="text-center mt-4 mb-0">
                    <a href="/auth/signin">Back to Sign In</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
