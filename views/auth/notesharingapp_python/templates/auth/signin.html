{% extends "base.html" %}

{% block title %}Sign In - Notes Sharing App{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <h2 class="card-title text-center mb-4">Sign In</h2>
                
                <form method="post" class="needs-validation">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me">
                        <label class="form-check-label" for="remember_me">Remember me (30 days)</label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mb-2">Sign In</button>
                </form>
                
                <!-- Admin Tab (Hidden) -->
                <div class="mt-3 pt-3 border-top">
                    <button type="button" class="btn btn-sm btn-outline-secondary w-100" data-bs-toggle="collapse" data-bs-target="#adminLogin">Admin Login</button>
                    <div class="collapse mt-3" id="adminLogin">
                        <form method="post" class="needs-validation">
                            <input type="hidden" name="admin_login" value="1">
                            <div class="mb-3">
                                <label for="admin_email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="admin_email" name="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="admin_password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="admin_password" name="password" required>
                            </div>
                            <button type="submit" class="btn btn-warning w-100">Admin Sign In</button>
                        </form>
                    </div>
                </div>
                
                <p class="text-center mt-4 mb-0">
                    Don't have an account? <a href="/auth/signup">Create one</a>
                </p>
                <p class="text-center">
                    <a href="/auth/forgot-password">Forgot Password?</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
